<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如何解決問題：思維層次 - P2</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .page-marker {
            text-align: right;
            color: #ccc;
            font-weight: bold;
            font-size: 1.2rem;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .level {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .level-1 { border-left: 5px solid #e74c3c; background-color: #fff5f5; }
        .level-2 { border-left: 5px solid #f39c12; background-color: #fff9f0; }
        .level-3 { border-left: 5px solid #3498db; background-color: #f0f7ff; }
        .level-4 { border-left: 5px solid #27ae60; background-color: #f2faf5; }
        
        .level-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: block;
        }
        ul {
            margin: 0;
            padding-left: 20px;
        }
        li {
            margin-bottom: 5px;
        }
        .footer-highlight {
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            color: #27ae60;
            font-size: 1.2rem;
            padding: 10px;
            border: 2px dashed #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-marker">P.3</div>
    <h1>如何解決問題</h1>

    <div class="level level-1">
        <span class="level-title">第一層次</span>
        <ul>
            <li>問題災難化？情緒崩潰、等人救。</li>
        </ul>
    </div>

    <div class="level level-2">
        <span class="level-title">第二層次</span>
        <ul>
            <li>知道問題會來？找辦法應付好像重複。</li>
            <li>一樣的問題，不知問題？表面？</li>
            <li>死循環？重複！自責？</li>
        </ul>
    </div>

    <div class="level level-3">
        <span class="level-title">第三層次</span>
        <ul>
            <li>抽離問題？反覆重演？找模式？</li>
            <li>自己承擔，自我的慣性？</li>
            <li>認知？邏輯出問題。</li>
        </ul>
    </div>

    <div class="level level-4">
        <span class="level-title">第四層次</span>
        <ul>
            <li>構建系統、安排結構？</li>
            <li>用重新改寫運用程式。</li>
            <li>重新設計？我如何選人、自己邊界。</li>
            <li>不改變別人，也不被別人影響，建立系統改變。</li>
        </ul>
    </div>


</div>

</body>
</html>
