<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顯化與能量頻率 - P3</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #2d3436;
        }
        .energy-card {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .page-num {
            font-family: serif;
            font-size: 1.2rem;
            color: #0984e3;
            text-align: right;
            margin-bottom: 10px;
        }
        h1 {
            text-align: center;
            color: #0984e3;
            font-size: 1.6rem;
            border-bottom: 2px solid #74b9ff;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 25px;
        }
        h3 {
            color: #2d3436;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .content {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.8;
        }
        .highlight {
            color: #d63031;
            font-weight: bold;
        }
        .frequency-tag {
            display: inline-block;
            background: #74b9ff;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-right: 5px;
        }
        .footer-insight {
            margin-top: 30px;
            text-align: center;
            font-size: 1.1rem;
            color: #4834d4;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="energy-card">
    <div class="page-num">P.3</div>
    <h1>顯化：能量與頻道</h1>

    <div class="section">
        <h3>1. 消費與豐盛感的對齊</h3>
        <div class="content">
            為什麼要花錢？是為了獲取那種<strong>「豐盛」</strong>的感覺。<br>
            當您與豐盛頻道對齊，宇宙便會透過您的「感覺」進行顯化。
        </div>
    </div>

    <div class="section">
        <h3>2. 內核：情緒價值</h3>
        <div class="content">
            能量決定一切。高頻能量源於：<br>
            <span class="frequency-tag">喜悅</span><span class="frequency-tag">和平</span><span class="frequency-tag">愛</span><br>
            要相信<strong>「凡事發生皆有利於我」</strong>，所有經歷都是為了渡化您而存在。
        </div>
    </div>

    <div class="section">
        <h3>3. 顯化的本質</h3>
        <div class="content">
            顯化不是去「要」什麼，而是去定義<span class="highlight">「我是什麼」</span>。<br>
            當您處在正確的頻道，一切理想皆會受吸引而來。
        </div>
    </div>

    <div class="footer-insight">
        當下轉念，世界隨心而變。
    </div>
</div>

</body>
</html>
